<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strategy Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-panel: #0d0d0d;
        --bg-section: #1a1a1a;
        --bg-hover: #252525;
        --text-primary: #e0e0e0;
        --text-muted: #888;
        --border: #333;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
      }

      #app-layout {
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
      }

      #game-container {
        position: fixed;
        left: 10vw;
        top: 0;
        width: 80vw;
        height: 100vh;
      }

      #panel-left,
      #panel-right {
        position: fixed;
        top: 0;
        width: 10vw;
        height: 100vh;
        overflow-y: auto;
        padding: 10px;
        background: var(--bg-panel);
        color: #ccc;
        font-family: monospace;
        font-size: 13px;
        line-height: 1.4;
        box-sizing: border-box;
      }

      #panel-left {
        left: 0;
      }

      #panel-right {
        left: 90vw;
      }

      .html-panel {
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .panel-section {
        background: var(--bg-section);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 10px;
        margin-bottom: 10px;
      }

      .panel-heading {
        color: var(--text-muted);
        font-size: 11px;
        letter-spacing: 1px;
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .panel-large {
        color: var(--text-primary);
        font-size: 22px;
        font-weight: 700;
        line-height: 1.15;
      }

      .panel-muted {
        color: var(--text-muted);
      }

      .panel-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
      }

      .panel-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex: 0 0 auto;
      }

      .nation-swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        flex-shrink: 0;
        display: inline-block;
      }

      .nation-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 6px;
        cursor: pointer;
        border-radius: 3px;
        border-left: 3px solid transparent;
        font-size: 12px;
      }

      .nation-row:hover {
        background: var(--bg-hover, #1a1f2a);
      }

      .nation-row-selected {
        background: #1a2a1a;
        border-left-color: #d4a857;
      }

      .leader-portrait-button {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 7px 4px;
        margin: 4px 0;
        border: 1px solid transparent;
        border-radius: 4px;
        background: transparent;
        color: var(--text-primary);
        cursor: pointer;
        font: inherit;
      }

      .leader-portrait-button:hover {
        background: var(--bg-hover);
        border-color: var(--border);
      }

      .leader-nation-name {
        width: 100%;
        font-size: 10px;
        font-weight: 700;
        overflow: hidden;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .leader-name {
        width: 100%;
        color: var(--text-muted);
        font-size: 10px;
        line-height: 1.15;
        overflow: hidden;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .leader-portrait,
      .leader-portrait-fallback {
        width: min(64px, 7vw);
        height: min(82px, 9vw);
        border-radius: 50% / 43%;
        border: 1px solid #4a3a2a;
        background: #151515;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      }

      .leader-portrait {
        object-fit: cover;
      }

      .leader-portrait-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 20px;
      }

      .leader-detail-portrait,
      .leader-detail-fallback {
        width: 100%;
        max-width: 150px;
        aspect-ratio: 3 / 4;
        border-radius: 50% / 43%;
        border: 1px solid #5a4a35;
        background: #151515;
        display: block;
        margin: 0 auto 10px;
      }

      .leader-detail-portrait {
        object-fit: cover;
      }

      .leader-detail-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 32px;
      }

      .nation-city-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin: 2px 0;
      }

      .panel-city-button,
      .production-row,
      .found-city-button {
        border: 0;
        color: var(--text-primary);
        font: inherit;
      }

      .panel-city-button {
        background: transparent;
        cursor: pointer;
        font-weight: 700;
        padding: 0;
        text-align: left;
      }

      .panel-city-button:hover,
      .found-city-button:hover {
        color: #fff;
      }

      .hp-bar {
        height: 8px;
        background: #333;
        border-radius: 4px;
        overflow: hidden;
        margin: 4px 0 6px;
      }

      .hp-fill {
        height: 100%;
        background: #4a9;
      }

      .production-row {
        width: 100%;
        display: block;
        padding: 6px 8px;
        border-radius: 4px;
        background: transparent;
        text-align: left;
        cursor: pointer;
        margin: 3px 0;
        border-left: 3px solid transparent;
      }

      .production-row:hover {
        background: var(--bg-hover);
      }

      .production-row.active {
        background: #1f1f1f;
      }

      .found-city-button {
        width: 100%;
        margin-top: 8px;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg-section);
        cursor: pointer;
      }

      .score-dead {
        color: var(--text-muted);
        text-decoration: line-through;
      }

      .panel-separator {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 12px 0;
      }

      .queue-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px;
        padding: 4px 6px;
        border-radius: 3px;
        margin: 2px 0;
        font-size: 12px;
        position: relative;
      }

      .queue-row.queue-active {
        background: #1a2a1a;
        border-left: 3px solid #4a9;
      }

      .queue-row span:first-child {
        flex: 1;
        min-width: 0;
      }

      .queue-progress {
        width: 100%;
        height: 4px;
        background: #333;
        border-radius: 2px;
        overflow: hidden;
      }

      .queue-progress-fill {
        height: 100%;
        background: #4a9;
      }

      .queue-remove-btn {
        background: transparent;
        border: 1px solid #666;
        color: #999;
        font-size: 14px;
        line-height: 1;
        width: 20px;
        height: 20px;
        padding: 0;
        cursor: pointer;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .queue-remove-btn:hover {
        background: #600;
        color: #fff;
        border-color: #a00;
      }

      .add-queue-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 3px 0;
        font-size: 12px;
      }

      .queue-add-btn {
        background: #2a3a2a;
        border: 1px solid #4a6a4a;
        color: #8c8;
        font-size: 11px;
        padding: 2px 8px;
        cursor: pointer;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .queue-add-btn:hover {
        background: #3a5a3a;
        color: #afa;
      }
    </style>
  </head>
  <body>
    <div id="app-layout">
      <div id="panel-left"></div>
      <div id="game-container"></div>
      <div id="panel-right"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
