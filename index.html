<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strategy Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-panel: #0d0d0d;
        --bg-section: #1a1a1a;
        --bg-hover: #252525;
        --text-primary: #e0e0e0;
        --text-muted: #888;
        --border: #333;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
      }

      #app-layout {
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
      }

      #game-container {
        position: fixed;
        left: 10vw;
        top: 0;
        width: 80vw;
        height: 100vh;
      }

      #panel-left,
      #panel-right {
        position: fixed;
        top: 0;
        width: 10vw;
        height: 100vh;
        overflow-y: auto;
        padding: 10px;
        background: var(--bg-panel);
        color: #ccc;
        font-family: monospace;
        font-size: 13px;
        line-height: 1.4;
        box-sizing: border-box;
      }

      #panel-left {
        left: 0;
      }

      #panel-right {
        left: 90vw;
      }

      .html-panel {
        color: var(--text-primary);
      }

      .panel-section {
        background: var(--bg-section);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 10px;
        margin-bottom: 10px;
      }

      .panel-heading {
        color: var(--text-muted);
        font-size: 11px;
        letter-spacing: 1px;
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .panel-large {
        color: var(--text-primary);
        font-size: 22px;
        font-weight: 700;
        line-height: 1.15;
      }

      .panel-muted {
        color: var(--text-muted);
      }

      .panel-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
      }

      .panel-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex: 0 0 auto;
      }

      .panel-city-button,
      .production-row,
      .found-city-button {
        border: 0;
        color: var(--text-primary);
        font: inherit;
      }

      .panel-city-button {
        background: transparent;
        cursor: pointer;
        font-weight: 700;
        padding: 0;
        text-align: left;
      }

      .panel-city-button:hover,
      .found-city-button:hover {
        color: #fff;
      }

      .hp-bar {
        height: 8px;
        background: #333;
        border-radius: 4px;
        overflow: hidden;
        margin: 4px 0 6px;
      }

      .hp-fill {
        height: 100%;
        background: #4a9;
      }

      .production-row {
        width: 100%;
        display: block;
        padding: 6px 8px;
        border-radius: 4px;
        background: transparent;
        text-align: left;
        cursor: pointer;
        margin: 3px 0;
        border-left: 3px solid transparent;
      }

      .production-row:hover {
        background: var(--bg-hover);
      }

      .production-row.active {
        background: #1f1f1f;
      }

      .found-city-button {
        width: 100%;
        margin-top: 8px;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg-section);
        cursor: pointer;
      }

      .score-dead {
        color: var(--text-muted);
        text-decoration: line-through;
      }

      .panel-separator {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 12px 0;
      }
    </style>
  </head>
  <body>
    <div id="app-layout">
      <div id="panel-left"></div>
      <div id="game-container"></div>
      <div id="panel-right"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
