<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #111; color: #ddd; font-family: monospace; overflow: hidden; }

#app { display: flex; height: 100vh; }

#toolbar {
  width: 220px; flex-shrink: 0; background: #1a1a1a; padding: 12px;
  overflow-y: auto; border-right: 1px solid #333;
  display: flex; flex-direction: column; gap: 10px;
}

#toolbar h2 { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

.section { background: #222; border: 1px solid #333; border-radius: 4px; padding: 8px; }
.section-title { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 6px; }

.palette-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.palette-btn {
  border: 2px solid transparent; border-radius: 3px; padding: 4px 6px;
  font: inherit; font-size: 11px; color: #ddd; cursor: pointer; text-align: left;
  display: flex; align-items: center; gap: 6px;
}
.palette-btn:hover { border-color: #666; }
.palette-btn.active { border-color: #fff; background: #333; }
.palette-btn.invalid { opacity: 0.45; }
.palette-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
.palette-resource-img { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; image-rendering: pixelated; }
.palette-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 6px; }
.mode-btn {
  width: 100%; margin-bottom: 6px; border: 2px solid transparent; border-radius: 3px;
  padding: 6px 8px; background: #2a2a2a; color: #ddd; font: inherit; font-size: 12px;
  cursor: pointer; display: flex; align-items: center; gap: 7px; text-align: left;
}
.mode-btn:hover { border-color: #666; }
.mode-btn.active { border-color: #fff; background: #333; }
.mode-icon { font-size: 14px; line-height: 1; }

.tool-btns { display: flex; flex-direction: column; gap: 4px; }
.tool-btn {
  border: 2px solid transparent; border-radius: 3px; padding: 6px 8px;
  font: inherit; font-size: 12px; color: #ddd; cursor: pointer;
  background: #2a2a2a; text-align: left;
}
.tool-btn:hover { border-color: #666; }
.tool-btn.active { border-color: #fff; background: #333; }

.entity-list { display: flex; flex-direction: column; gap: 3px; }
.entity-row {
  font-size: 11px; padding: 3px 6px; border-radius: 3px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}
.entity-row:hover { background: #2a2a2a; }
.entity-row.selected { background: #333; outline: 1px solid #888; }
.entity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.nation-row { align-items: flex-start; }
.nation-row-copy { display: grid; gap: 2px; min-width: 0; }
.nation-row-copy strong { font-size: 11px; color: #ddd; }
.nation-row-copy span { font-size: 10px; color: #888; overflow-wrap: anywhere; }
.nation-portrait { width: 28px; height: 34px; border-radius: 3px; object-fit: cover; background: #333; flex-shrink: 0; }
.nation-color-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
.nation-select-row { display: grid; grid-template-columns: 36px minmax(0, 1fr); gap: 8px; align-items: center; }
.nation-select-row img { width: 36px; height: 44px; border-radius: 3px; object-fit: cover; background: #333; }

.toolbar-actions { display: flex; flex-direction: column; gap: 8px; }
#save-btn, #exit-btn {
  padding: 10px; border: 1px solid #4a9; border-radius: 4px; background: #1a3a2a;
  color: #4a9; font: inherit; font-size: 13px; cursor: pointer; font-weight: bold;
}
#save-btn:hover { background: #2a4a3a; }
#exit-btn { border-color: #777; background: #242424; color: #ddd; }
#exit-btn:hover { background: #303030; border-color: #aaa; }

.field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; font-size: 11px; color: #aaa; }
.field input, .field select {
  width: 100%; background: #151515; border: 1px solid #444; border-radius: 3px;
  color: #ddd; font: inherit; font-size: 12px; padding: 5px;
}
.field input[type="color"] { height: 34px; padding: 2px; }
.inline-field { display: flex; align-items: center; gap: 6px; }
.inline-field input[type="color"] { width: 34px; height: 28px; padding: 1px; }
.small-btn {
  width: 100%; border: 1px solid #555; border-radius: 3px; padding: 6px 8px;
  background: #2a2a2a; color: #ddd; font: inherit; font-size: 12px; cursor: pointer;
}
.small-btn:hover { border-color: #888; background: #333; }
.hint { font-size: 10px; color: #777; line-height: 1.35; margin-top: 5px; }
.warning-box {
  display: none; white-space: pre-wrap; font-size: 10px; line-height: 1.35;
  color: #f3ca72; background: #302615; border: 1px solid #6c5420;
  border-radius: 3px; padding: 6px; margin-top: 8px;
}

#viewport { flex: 1; position: relative; overflow: hidden; cursor: crosshair; }
#canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }

#status {
  position: fixed; bottom: 0; left: 220px; right: 0; height: 24px;
  background: #1a1a1a; border-top: 1px solid #333; padding: 0 12px;
  font-size: 11px; color: #888; display: flex; align-items: center; gap: 16px;
}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <h2>Map Editor</h2>

    <div class="section">
      <div class="section-title">Tool</div>
      <div class="tool-btns" id="tool-btns">
        <button class="tool-btn active" data-tool="paint">Paint Terrain</button>
        <button class="tool-btn" data-tool="move">Move City / Unit</button>
        <button class="tool-btn" data-tool="setStart">Set Start Position</button>
        <button class="tool-btn" data-tool="addCity">Add City</button>
        <button class="tool-btn" data-tool="addUnit">Add Unit</button>
      </div>
    </div>

    <div class="section" id="nation-section">
      <div class="section-title">Nations</div>
      <div class="entity-list" id="nation-list"></div>
      <div class="section-title" style="margin-top:8px">Selected Nation Colors</div>
      <div class="nation-color-grid">
        <label class="field">
          Primary
          <input id="nation-primary-color" type="color">
        </label>
        <label class="field">
          Secondary
          <input id="nation-secondary-color" type="color">
        </label>
      </div>
      <div class="section-title" style="margin-top:8px">Add Nation</div>
      <label class="field">
        Registry Nation
        <span class="nation-select-row">
          <img id="nation-registry-portrait" alt="">
          <select id="nation-registry-select"></select>
        </span>
      </label>
      <button class="small-btn" id="add-nation-btn">Add Nation</button>
      <button class="small-btn" id="remove-nation-btn" style="margin-top:4px">Remove Selected Nation</button>
      <div class="hint" id="selected-nation-info">No nation selected.</div>
    </div>

    <div class="section" id="palette-section">
      <div class="section-title" id="palette-title">Terrain Palette</div>
      <div class="palette-tabs">
        <button class="mode-btn active" id="terrain-paint-mode-btn" type="button" aria-pressed="true">
          <span class="mode-icon" aria-hidden="true">&#9635;</span>
          <span>Terrain</span>
        </button>
        <button class="mode-btn" id="resource-paint-mode-btn" type="button" aria-pressed="false">
          <span class="mode-icon" aria-hidden="true">&#9672;</span>
          <span>Resource</span>
        </button>
      </div>
      <button class="mode-btn" id="pan-mode-btn" type="button" aria-pressed="false">
        <span class="mode-icon" aria-hidden="true">&#9995;</span>
        <span>Pan Camera</span>
      </button>
      <div class="palette-grid" id="palette"></div>
    </div>

    <div class="section" id="entities-section" style="display:none">
      <div class="section-title">Cities</div>
      <div class="entity-list" id="city-list"></div>
      <div class="section-title" style="margin-top:8px">Units</div>
      <div class="entity-list" id="unit-list"></div>
    </div>

    <div class="section" id="unit-tool-section" style="display:none">
      <div class="section-title">Unit Type</div>
      <label class="field">
        Type
        <select id="unit-type-select">
          <option value="warrior">warrior</option>
          <option value="archer">archer</option>
          <option value="cavalry">cavalry</option>
          <option value="settler">settler</option>
          <option value="fishing_boat">fishing_boat</option>
          <option value="transport_ship">transport_ship</option>
        </select>
      </label>
    </div>

    <div class="section">
      <div class="section-title">Brush</div>
      <label style="font-size:12px; display:flex; align-items:center; gap:6px;">
        Size: <input type="range" id="brush-size" min="1" max="5" value="1" style="flex:1">
        <span id="brush-size-label">1</span>
      </label>
    </div>

    <div class="toolbar-actions">
      <button id="save-btn">Download scenario JSON</button>
      <button id="exit-btn">Exit to Start</button>
    </div>
    <div id="validation-warning" class="warning-box"></div>
  </div>

  <div id="viewport">
    <canvas id="canvas"></canvas>
  </div>
</div>
<div id="status">
  <span id="status-pos">—</span>
  <span id="status-tile">—</span>
  <span id="status-info">Loading...</span>
</div>

<script>
const TILE_TYPES = ['ocean','coast','plains','forest','mountain','ice','jungle','desert'];
const TILE_COLORS = {
  ocean:    '#1a557d',
  coast:    '#4f8da7',
  plains:   '#83b865',
  forest:   '#2f7440',
  mountain: '#777b7b',
  ice:      '#c8e6e8',
  jungle:   '#236f50',
  desert:   '#cdb65e',
};

let scenario = null;
let mapManifest = { maps: [] };
let currentMap = null;
let nationRegistry = { nations: [] };
let naturalResourceManifest = { resources: [] };
let tiles = null; // 2D array [r][q] of type strings
let tileResources = null; // 2D array [r][q] of resource ids or undefined
let mapW = 0, mapH = 0, tileSize = 0;
let hexSize = 0;
let worldBounds = { width: 0, height: 0 };
const SQRT_3 = Math.sqrt(3);

// View state
let camX = 0, camY = 0, zoom = 1;
const MIN_ZOOM = 0.08, MAX_ZOOM = 4;
const PAN_SPEED = 400;
const DRAG_THRESHOLD = 4;

// Tool state
let currentTool = 'paint';
let currentPaintMode = 'terrain';
let currentTerrain = 'plains';
let currentResourceId = null;
let interactionMode = 'paint';
let brushSize = 1;
let selectedEntity = null; // { kind: 'city'|'unit', index: number }
let selectedNationId = null;
let isPainting = false;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const viewport = document.getElementById('viewport');
const resourceImages = new Map();

// ─── Load scenario ──────────────────────────────────────────────────────────

async function init() {
  [mapManifest, nationRegistry, naturalResourceManifest] = await Promise.all([
    loadMapManifest(),
    loadNationRegistry(),
    loadNaturalResourceManifest(),
  ]);
  currentMap = resolveRequestedMap(mapManifest);
  if (!currentMap) {
    document.getElementById('status-info').textContent = 'No maps available. Regenerate assets/maps/manifest.json.';
    return;
  }

  const res = await fetch(`/${currentMap.file}`);
  scenario = await res.json();
  normalizeNationColors();
  document.title = `Map Editor — ${currentMap.label}`;
  document.getElementById('save-btn').textContent = `Download ${getMapFilename(currentMap)}`;

  mapW = scenario.map.width;
  mapH = scenario.map.height;
  tileSize = scenario.map.tileSize;
  hexSize = tileSize / 2;

  // Build 2D q/r tile array
  tiles = [];
  tileResources = [];
  for (let r = 0; r < mapH; r++) {
    const row = [];
    const resourceRow = [];
    for (let q = 0; q < mapW; q++) row.push('ocean');
    for (let q = 0; q < mapW; q++) resourceRow.push(undefined);
    tiles.push(row);
    tileResources.push(resourceRow);
  }
  for (const t of scenario.map.tiles) {
    if (tiles[t.r]) {
      tiles[t.r][t.q] = t.type;
      if (typeof t.resourceId === 'string' && t.resourceId.length > 0) {
        tileResources[t.r][t.q] = t.resourceId;
      }
    }
  }

  // Center camera
  worldBounds = getWorldBounds();
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  zoom = Math.min(vw / worldBounds.width, vh / worldBounds.height);
  camX = worldBounds.width / 2 - vw / (2 * zoom);
  camY = worldBounds.height / 2 - vh / (2 * zoom);
  clampCamera();

  buildPalette();
  selectedNationId = scenario.nations[0]?.id ?? null;
  buildNationRegistrySelect();
  buildNationList();
  buildEntityLists();
  updateToolPanels();
  resizeCanvas();
  render();
  document.getElementById('status-info').textContent = `${currentMap.label}: ${mapW}x${mapH} q/r hexes loaded`;
}

async function loadMapManifest() {
  try {
    const res = await fetch('/assets/maps/manifest.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`manifest fetch failed: ${res.status}`);
    const manifest = await res.json();
    if (manifest && Array.isArray(manifest.maps) && manifest.maps.length > 0) {
      return {
        maps: manifest.maps.filter(map =>
          map && typeof map.key === 'string' && typeof map.label === 'string' && typeof map.file === 'string'
        ),
      };
    }
  } catch (err) {
    console.warn('Failed to load map manifest.', err);
  }

  return { maps: [] };
}

async function loadNationRegistry() {
  try {
    const res = await fetch('/assets/data/nations-manifest.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`nation registry fetch failed: ${res.status}`);
    const manifest = await res.json();
    if (manifest && Array.isArray(manifest.nations)) {
      return {
        nations: manifest.nations.filter(nation =>
          nation
          && typeof nation.nationId === 'string'
          && typeof nation.nationName === 'string'
          && typeof nation.color === 'string'
          && typeof nation.secondaryColor === 'string'
          && typeof nation.leaderId === 'string'
          && typeof nation.leaderName === 'string'
          && typeof nation.leaderTitle === 'string'
          && typeof nation.leaderImage === 'string'
        ),
      };
    }
  } catch (err) {
    console.warn('Failed to load nation registry.', err);
  }

  return { nations: [] };
}

async function loadNaturalResourceManifest() {
  try {
    const res = await fetch('/assets/data/natural-resources-manifest.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`natural resource manifest fetch failed: ${res.status}`);
    const manifest = await res.json();
    if (manifest && Array.isArray(manifest.resources)) {
      return {
        resources: manifest.resources.filter(resource =>
          resource
          && typeof resource.id === 'string'
          && typeof resource.name === 'string'
          && Array.isArray(resource.allowedTileTypes)
        ),
      };
    }
  } catch (err) {
    console.warn('Failed to load natural resource manifest.', err);
  }

  return { resources: [] };
}

function resolveRequestedMap(manifest) {
  const requestedKey = new URLSearchParams(window.location.search).get('map');
  return manifest.maps.find(map => map.key === requestedKey) ?? manifest.maps[0];
}

function getMapFilename(map) {
  return map.file.split('/').pop() || 'scenario.json';
}

// ─── Palette ────────────────────────────────────────────────────────────────

function buildPalette() {
  const grid = document.getElementById('palette');
  grid.innerHTML = '';
  document.getElementById('palette-title').textContent = currentPaintMode === 'terrain'
    ? 'Terrain Palette'
    : 'Resource Palette';

  if (currentPaintMode === 'resource') {
    buildResourcePalette(grid);
    updateInteractionModeUI();
    return;
  }

  for (const type of TILE_TYPES) {
    const btn = document.createElement('button');
    btn.className = 'palette-btn' + (type === currentTerrain ? ' active' : '');
    btn.dataset.type = type;
    btn.innerHTML = `<span class="palette-swatch" style="background:${TILE_COLORS[type]}"></span>${type}`;
    btn.addEventListener('click', () => {
      currentTerrain = type;
      currentTool = 'paint';
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === 'paint'));
      updateToolPanels();
      setInteractionMode('paint');
      grid.querySelectorAll('.palette-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
      render();
    });
    grid.appendChild(btn);
  }
  updateInteractionModeUI();
}

function buildResourcePalette(grid) {
  const clearBtn = document.createElement('button');
  clearBtn.className = 'palette-btn' + (currentResourceId === null ? ' active' : '');
  clearBtn.dataset.resourceId = '';
  clearBtn.innerHTML = `<span class="palette-swatch" style="background:#111; border:1px solid #666"></span>None`;
  clearBtn.title = 'Clear resource';
  clearBtn.addEventListener('click', () => selectResource(null));
  grid.appendChild(clearBtn);

  for (const resource of naturalResourceManifest.resources) {
    const btn = document.createElement('button');
    btn.className = 'palette-btn' + (resource.id === currentResourceId ? ' active' : '');
    btn.dataset.resourceId = resource.id;
    btn.title = `${resource.name} (${resource.allowedTileTypes.join(', ')})`;
    const iconPath = resource.iconPath || `/assets/sprites/resources/${resource.id}.png`;
    btn.innerHTML = `<img class="palette-resource-img" src="${iconPath}" alt="">${resource.name}`;
    btn.addEventListener('click', () => selectResource(resource.id));
    grid.appendChild(btn);
  }
}

function selectResource(resourceId) {
  currentResourceId = resourceId;
  currentTool = 'paint';
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === 'paint'));
  updateToolPanels();
  setInteractionMode('paint');
  buildPalette();
  render();
}

document.getElementById('pan-mode-btn').addEventListener('click', () => {
  setInteractionMode('pan');
});

document.getElementById('terrain-paint-mode-btn').addEventListener('click', () => {
  currentPaintMode = 'terrain';
  buildPalette();
  updateInteractionModeUI();
});

document.getElementById('resource-paint-mode-btn').addEventListener('click', () => {
  currentPaintMode = 'resource';
  buildPalette();
  updateInteractionModeUI();
});

// ─── Entity lists ───────────────────────────────────────────────────────────

function buildEntityLists() {
  const cityList = document.getElementById('city-list');
  const unitList = document.getElementById('unit-list');
  cityList.innerHTML = '';
  unitList.innerHTML = '';

  scenario.cities.forEach((city, i) => {
    const row = document.createElement('div');
    row.className = 'entity-row';
    row.innerHTML = `<span class="entity-dot" style="background:${getNationColor(city.nationId)}"></span>
      <span>${city.name} (${city.q},${city.r})</span>`;
    row.addEventListener('click', () => selectEntity('city', i));
    cityList.appendChild(row);
  });

  scenario.units.forEach((unit, i) => {
    const row = document.createElement('div');
    row.className = 'entity-row';
    row.innerHTML = `<span class="entity-dot" style="background:${getNationColor(unit.nationId)}"></span>
      <span>${unit.unitTypeId} (${unit.q},${unit.r})</span>`;
    row.addEventListener('click', () => selectEntity('unit', i));
    unitList.appendChild(row);
  });
}

// ─── Nation editing ─────────────────────────────────────────────────────────

function getRegistryNation(nationId) {
  return nationRegistry.nations.find(nation => nation.nationId === nationId) || null;
}

function getNationDisplayName(nation) {
  return getRegistryNation(nation.id)?.nationName ?? nation.name;
}

function getNationSecondaryColor(nationId) {
  const scenarioNation = scenario.nations.find(n => n.id === nationId);
  return scenarioNation?.secondaryColor || getRegistryNation(nationId)?.secondaryColor || getNationColor(nationId);
}

function getNationColor(nationId) {
  const scenarioNation = scenario.nations.find(n => n.id === nationId);
  return scenarioNation?.color || getRegistryNation(nationId)?.color || '#888';
}

function getNationSwatchStyle(primaryColor, secondaryColor) {
  const secondary = secondaryColor || primaryColor;
  return `linear-gradient(135deg, ${primaryColor} 0 50%, ${secondary} 50% 100%)`;
}

function normalizeNationColors() {
  if (!scenario || !Array.isArray(scenario.nations)) return;
  scenario.nations = scenario.nations.map((nation) => {
    const registryNation = getRegistryNation(nation.id);
    const primaryColor = nation.color || registryNation?.color || '#888888';
    return {
      ...nation,
      color: primaryColor,
      secondaryColor: nation.secondaryColor || registryNation?.secondaryColor || primaryColor,
    };
  });
}

function getAvailableRegistryNations() {
  const activeIds = new Set(scenario.nations.map(nation => nation.id));
  return nationRegistry.nations.filter(nation => !activeIds.has(nation.nationId));
}

function buildNationRegistrySelect() {
  const select = document.getElementById('nation-registry-select');
  const available = getAvailableRegistryNations();
  select.innerHTML = '';

  for (const nation of available) {
    const option = document.createElement('option');
    option.value = nation.nationId;
    option.textContent = `${nation.nationName} — ${nation.leaderName}`;
    select.appendChild(option);
  }

  select.disabled = available.length === 0;
  document.getElementById('add-nation-btn').disabled = available.length === 0;
  updateRegistryNationPreview();
}

function updateRegistryNationPreview() {
  const select = document.getElementById('nation-registry-select');
  const portrait = document.getElementById('nation-registry-portrait');
  const nation = getRegistryNation(select.value);
  portrait.src = nation?.leaderImage || '';
  portrait.alt = nation ? nation.leaderName : '';
  portrait.style.visibility = nation ? 'visible' : 'hidden';
}

document.getElementById('nation-registry-select').addEventListener('change', updateRegistryNationPreview);

function buildNationList() {
  const nationList = document.getElementById('nation-list');
  nationList.innerHTML = '';

  scenario.nations.forEach((nation) => {
    const capital = scenario.cities.find(c => c.nationId === nation.id && c.isCapital);
    const registryNation = getRegistryNation(nation.id);
    const row = document.createElement('div');
    row.className = 'entity-row nation-row' + (nation.id === selectedNationId ? ' selected' : '');
    row.innerHTML = `${registryNation ? `<img class="nation-portrait" src="${registryNation.leaderImage}" alt="">` : `<span class="entity-dot" style="background:${getNationSwatchStyle(nation.color || '#888', nation.secondaryColor || nation.color || '#888')}"></span>`}
      <span class="nation-row-copy">
        <strong>${getNationDisplayName(nation)}${capital ? ` (${capital.q},${capital.r})` : ''}</strong>
        <span>${registryNation ? registryNation.leaderName : `Unknown nation: ${nation.id}`}</span>
      </span>`;
    row.addEventListener('click', () => selectNation(nation.id));
    nationList.appendChild(row);
  });

  updateSelectedNationInfo();
  buildNationRegistrySelect();
}

function selectNation(nationId) {
  selectedNationId = nationId;
  buildNationList();
  render();
}

function getSelectedNation() {
  return scenario.nations.find(n => n.id === selectedNationId) || null;
}

function updateSelectedNationInfo() {
  const el = document.getElementById('selected-nation-info');
  const removeBtn = document.getElementById('remove-nation-btn');
  const primaryInput = document.getElementById('nation-primary-color');
  const secondaryInput = document.getElementById('nation-secondary-color');
  const nation = getSelectedNation();
  if (!nation) {
    el.textContent = 'No nation selected.';
    removeBtn.disabled = true;
    primaryInput.disabled = true;
    secondaryInput.disabled = true;
    primaryInput.value = '#888888';
    secondaryInput.value = '#888888';
    return;
  }

  const center = nation.startTerritoryCenter;
  const registryNation = getRegistryNation(nation.id);
  el.textContent = `Selected: ${getNationDisplayName(nation)} (${nation.id})` +
    (registryNation ? ` • leader ${registryNation.leaderName}` : ' • not in registry') +
    (center ? ` • start ${center.q},${center.r}` : ' • no start set');
  removeBtn.disabled = false;
  primaryInput.disabled = false;
  secondaryInput.disabled = false;
  primaryInput.value = nation.color;
  secondaryInput.value = nation.secondaryColor || nation.color;
}

document.getElementById('nation-primary-color').addEventListener('input', (event) => {
  const nation = getSelectedNation();
  if (!nation) return;
  nation.color = event.target.value;
  buildNationList();
  buildEntityLists();
  render();
});

document.getElementById('nation-secondary-color').addEventListener('input', (event) => {
  const nation = getSelectedNation();
  if (!nation) return;
  nation.secondaryColor = event.target.value;
  buildNationList();
  render();
});

document.getElementById('add-nation-btn').addEventListener('click', () => {
  const select = document.getElementById('nation-registry-select');
  const registryNation = getRegistryNation(select.value);
  if (!registryNation) {
    setStatusInfo('No registry nation available to add');
    return;
  }

  scenario.nations.push({
    id: registryNation.nationId,
    name: registryNation.nationName,
    color: registryNation.color,
    secondaryColor: registryNation.secondaryColor,
    isHuman: false,
    startTerritoryCenter: { q: 0, r: 0 },
  });
  selectedNationId = registryNation.nationId;
  setStatusInfo(`Added nation ${registryNation.nationName}. Use Set Start Position next.`);
  buildNationList();
  buildEntityLists();
  render();
});

document.getElementById('remove-nation-btn').addEventListener('click', () => {
  if (!selectedNationId) {
    setStatusInfo('Select a nation to remove');
    return;
  }

  removeNation(selectedNationId);
});

function removeNation(nationId) {
  const nation = scenario.nations.find(n => n.id === nationId);
  if (!nation) return;

  scenario.nations = scenario.nations.filter(n => n.id !== nationId);
  scenario.cities = scenario.cities.filter(c => c.nationId !== nationId);
  scenario.units = scenario.units.filter(u => u.nationId !== nationId);

  if (selectedEntity) {
    selectedEntity = null;
    updateEntityHighlights();
  }
  if (selectedNationId === nationId) selectedNationId = scenario.nations[0]?.id ?? null;

  setStatusInfo(`Removed ${getNationDisplayName(nation)} and its cities/units.`);
  buildNationList();
  buildEntityLists();
  updateSelectedNationInfo();
  render();
}

function selectEntity(kind, index) {
  if (selectedEntity && selectedEntity.kind === kind && selectedEntity.index === index) {
    selectedEntity = null;
  } else {
    selectedEntity = { kind, index };
    const entity = kind === 'city' ? scenario.cities[index] : scenario.units[index];
    if (entity?.nationId) selectedNationId = entity.nationId;
  }
  buildNationList();
  updateEntityHighlights();
  render();
}

function updateEntityHighlights() {
  document.querySelectorAll('#city-list .entity-row').forEach((row, i) => {
    row.classList.toggle('selected', selectedEntity?.kind === 'city' && selectedEntity.index === i);
  });
  document.querySelectorAll('#unit-list .entity-row').forEach((row, i) => {
    row.classList.toggle('selected', selectedEntity?.kind === 'unit' && selectedEntity.index === i);
  });
}

// ─── Tool switching ─────────────────────────────────────────────────────────

document.getElementById('tool-btns').addEventListener('click', (e) => {
  const btn = e.target.closest('.tool-btn');
  if (!btn) return;
  currentTool = btn.dataset.tool;
  if (currentTool === 'paint') setInteractionMode('paint');
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b === btn));
  updateToolPanels();
  selectedEntity = null;
  updateEntityHighlights();
  updateViewportCursor();
  render();
});

function updateToolPanels() {
  document.getElementById('palette-section').style.display = currentTool === 'paint' ? '' : 'none';
  document.getElementById('entities-section').style.display = currentTool === 'move' ? '' : 'none';
  document.getElementById('unit-tool-section').style.display = currentTool === 'addUnit' ? '' : 'none';
  updateInteractionModeUI();
}

function setInteractionMode(mode) {
  interactionMode = mode;
  updateInteractionModeUI();
  updateViewportCursor();
}

function updateInteractionModeUI() {
  const panModeBtn = document.getElementById('pan-mode-btn');
  const terrainModeBtn = document.getElementById('terrain-paint-mode-btn');
  const resourceModeBtn = document.getElementById('resource-paint-mode-btn');
  if (terrainModeBtn) {
    const active = currentTool === 'paint' && currentPaintMode === 'terrain';
    terrainModeBtn.classList.toggle('active', active);
    terrainModeBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
  }
  if (resourceModeBtn) {
    const active = currentTool === 'paint' && currentPaintMode === 'resource';
    resourceModeBtn.classList.toggle('active', active);
    resourceModeBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
  }
  if (!panModeBtn) return;
  const isPanMode = currentTool === 'paint' && interactionMode === 'pan';
  panModeBtn.classList.toggle('active', isPanMode);
  panModeBtn.setAttribute('aria-pressed', isPanMode ? 'true' : 'false');
}

function updateViewportCursor() {
  if (isPanning) {
    viewport.style.cursor = 'grabbing';
  } else if (currentTool === 'move') {
    viewport.style.cursor = 'default';
  } else if (currentTool === 'paint' && interactionMode === 'pan') {
    viewport.style.cursor = 'grab';
  } else {
    viewport.style.cursor = 'crosshair';
  }
}

// Brush size
const brushInput = document.getElementById('brush-size');
const brushLabel = document.getElementById('brush-size-label');
brushInput.addEventListener('input', () => {
  brushSize = parseInt(brushInput.value);
  brushLabel.textContent = brushSize;
});

// ─── Coordinate helpers ─────────────────────────────────────────────────────

function screenToWorld(sx, sy) {
  const rect = viewport.getBoundingClientRect();
  const wx = (sx - rect.left) / zoom + camX;
  const wy = (sy - rect.top) / zoom + camY;
  return { wx, wy };
}

function tileToWorld(q, r) {
  return {
    x: hexSize * SQRT_3 * (q + r / 2) + hexSize,
    y: hexSize * 1.5 * r + hexSize,
  };
}

function worldToTile(wx, wy) {
  const localX = wx - hexSize;
  const localY = wy - hexSize;
  const q = (SQRT_3 / 3 * localX - 1 / 3 * localY) / hexSize;
  const r = (2 / 3 * localY) / hexSize;
  const rounded = roundAxial(q, r);

  if (rounded.q < 0 || rounded.r < 0 || rounded.q >= mapW || rounded.r >= mapH) return null;
  return rounded;
}

function screenToTile(sx, sy) {
  const { wx, wy } = screenToWorld(sx, sy);
  return worldToTile(wx, wy);
}

function clampCamera() {
  const vw = viewport.clientWidth / zoom;
  const vh = viewport.clientHeight / zoom;
  camX = Math.max(0, Math.min(Math.max(0, worldBounds.width - vw), camX));
  camY = Math.max(0, Math.min(Math.max(0, worldBounds.height - vh), camY));
}

function roundAxial(q, r) {
  let rq = Math.round(q);
  let rr = Math.round(r);
  let rs = Math.round(-q - r);

  const qDiff = Math.abs(rq - q);
  const rDiff = Math.abs(rr - r);
  const sDiff = Math.abs(rs + q + r);

  if (qDiff > rDiff && qDiff > sDiff) {
    rq = -rr - rs;
  } else if (rDiff > sDiff) {
    rr = -rq - rs;
  }

  return { q: rq, r: rr };
}

function hexCorners(q, r) {
  const center = tileToWorld(q, r);
  return Array.from({ length: 6 }, (_, i) => {
    const angle = Math.PI / 180 * (60 * i - 30);
    return {
      x: center.x + hexSize * Math.cos(angle),
      y: center.y + hexSize * Math.sin(angle),
    };
  });
}

function hexRect(q, r) {
  const center = tileToWorld(q, r);
  const width = SQRT_3 * hexSize;
  const height = 2 * hexSize;
  return {
    x: center.x - width / 2,
    y: center.y - height / 2,
    width,
    height,
  };
}

function getWorldBounds() {
  if (mapW <= 0 || mapH <= 0) return { width: 0, height: 0 };
  let maxX = 0;
  let maxY = 0;

  for (let r = 0; r < mapH; r++) {
    for (let q = 0; q < mapW; q++) {
      const rect = hexRect(q, r);
      maxX = Math.max(maxX, rect.x + rect.width);
      maxY = Math.max(maxY, rect.y + rect.height);
    }
  }

  return { width: maxX, height: maxY };
}

// ─── Painting ───────────────────────────────────────────────────────────────

function getNaturalResource(resourceId) {
  return naturalResourceManifest.resources.find(resource => resource.id === resourceId) || null;
}

function isResourceAllowedOnTile(resourceId, tileType) {
  const resource = getNaturalResource(resourceId);
  return !!resource && resource.allowedTileTypes.includes(tileType);
}

function clearInvalidResourceForTerrain(q, r) {
  const resourceId = tileResources[r][q];
  if (resourceId && !isResourceAllowedOnTile(resourceId, tiles[r][q])) {
    tileResources[r][q] = undefined;
    return resourceId;
  }
  return null;
}

function paintAt(q, r) {
  if (currentPaintMode === 'resource') {
    paintResourceAt(q, r);
    return;
  }

  const radius = brushSize - 1;
  let changed = false;
  let cleared = 0;

  for (let dq = -radius; dq <= radius; dq++) {
    const minDr = Math.max(-radius, -dq - radius);
    const maxDr = Math.min(radius, -dq + radius);

    for (let dr = minDr; dr <= maxDr; dr++) {
      const pq = q + dq;
      const pr = r + dr;
      if (pq < 0 || pr < 0 || pq >= mapW || pr >= mapH) continue;
      if (tiles[pr][pq] !== currentTerrain) {
        tiles[pr][pq] = currentTerrain;
        if (clearInvalidResourceForTerrain(pq, pr)) cleared += 1;
        changed = true;
      }
    }
  }
  if (cleared > 0) setStatusInfo(`Cleared ${cleared} incompatible resource${cleared === 1 ? '' : 's'}`);
  if (changed) render();
}

function paintResourceAt(q, r) {
  const radius = brushSize - 1;
  let changed = false;
  let rejected = 0;

  for (let dq = -radius; dq <= radius; dq++) {
    const minDr = Math.max(-radius, -dq - radius);
    const maxDr = Math.min(radius, -dq + radius);

    for (let dr = minDr; dr <= maxDr; dr++) {
      const pq = q + dq;
      const pr = r + dr;
      if (pq < 0 || pr < 0 || pq >= mapW || pr >= mapH) continue;

      if (currentResourceId === null) {
        if (tileResources[pr][pq] !== undefined) {
          tileResources[pr][pq] = undefined;
          changed = true;
        }
        continue;
      }

      if (!isResourceAllowedOnTile(currentResourceId, tiles[pr][pq])) {
        rejected += 1;
        continue;
      }

      if (tileResources[pr][pq] !== currentResourceId) {
        tileResources[pr][pq] = currentResourceId;
        changed = true;
      }
    }
  }

  if (rejected > 0) {
    const resource = getNaturalResource(currentResourceId);
    setStatusInfo(`${resource?.name || currentResourceId} cannot be placed on ${rejected} selected tile${rejected === 1 ? '' : 's'}`);
  }
  if (changed) render();
}

// ─── Moving entities ────────────────────────────────────────────────────────

function moveEntityTo(q, r) {
  if (!selectedEntity) return;
  if (selectedEntity.kind === 'city') {
    const city = scenario.cities[selectedEntity.index];
    city.q = q;
    city.r = r;
    // Also update nation startTerritoryCenter if this is a capital
    if (city.isCapital) {
      const nation = scenario.nations.find(n => n.id === city.nationId);
      if (nation) {
        nation.startTerritoryCenter = { q, r };
      }
    }
  } else {
    const unit = scenario.units[selectedEntity.index];
    unit.q = q;
    unit.r = r;
  }
  buildEntityLists();
  if (selectedEntity) updateEntityHighlights();
  render();
}

function setStartPosition(q, r) {
  const nation = getSelectedNation();
  if (!nation) {
    setStatusInfo('Select a nation before setting start position');
    return;
  }

  nation.startTerritoryCenter = { q, r };
  setStatusInfo(`${nation.name} start territory center set to (${q},${r})`);
  buildNationList();
  render();
}

function makeUniqueId(prefix, base, existingIds) {
  const slug = slugifyLabel(base) || prefix;
  let id = `${prefix}_${slug}`;
  let i = 2;
  while (existingIds.has(id)) {
    id = `${prefix}_${slug}_${i}`;
    i++;
  }
  return id;
}

function slugifyLabel(label) {
  return label.trim().toLowerCase()
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '');
}

function makeDefaultCityName(nation) {
  const base = nation.name ? `${nation.name} City` : 'New City';
  const ownedCount = scenario.cities.filter(c => c.nationId === nation.id).length;
  return ownedCount === 0 ? base : `${base} ${ownedCount + 1}`;
}

function addCityAt(q, r) {
  const nation = getSelectedNation();
  if (!nation) {
    setStatusInfo('Select a nation before adding a city');
    return;
  }

  const existingIds = new Set(scenario.cities.map(c => c.id));
  const nationCities = scenario.cities.filter(c => c.nationId === nation.id);
  const name = makeDefaultCityName(nation);
  const city = {
    id: makeUniqueId('city', name, existingIds),
    name,
    nationId: nation.id,
    q,
    r,
    isCapital: nationCities.length === 0,
  };

  scenario.cities.push(city);
  if (city.isCapital) nation.startTerritoryCenter = { q, r };
  selectedEntity = { kind: 'city', index: scenario.cities.length - 1 };
  setStatusInfo(`Added ${city.isCapital ? 'capital' : 'city'} ${city.name}`);
  buildNationList();
  buildEntityLists();
  updateEntityHighlights();
  render();
}

function addUnitAt(q, r) {
  const nation = getSelectedNation();
  if (!nation) {
    setStatusInfo('Select a nation before adding a unit');
    return;
  }

  const unitTypeId = document.getElementById('unit-type-select').value;
  scenario.units.push({
    nationId: nation.id,
    unitTypeId,
    q,
    r,
  });
  selectedEntity = { kind: 'unit', index: scenario.units.length - 1 };
  setStatusInfo(`Added ${unitTypeId} for ${nation.name}`);
  buildEntityLists();
  updateEntityHighlights();
  render();
}

// ─── Mouse events on viewport ───────────────────────────────────────────────

let isPanning = false;
let panStartX = 0, panStartY = 0, panCamStartX = 0, panCamStartY = 0;
let leftPointerDown = false;
let leftPointerDragged = false;

function startPanning(clientX, clientY) {
  isPanning = true;
  panStartX = clientX;
  panStartY = clientY;
  panCamStartX = camX;
  panCamStartY = camY;
  updateViewportCursor();
}

viewport.addEventListener('mousedown', (e) => {
  // Middle mouse or right mouse can still pan without changing editor mode.
  if (e.button === 1 || e.button === 2) {
    startPanning(e.clientX, e.clientY);
    e.preventDefault();
    return;
  }

  if (e.button !== 0) return;

  if (currentTool === 'paint' && interactionMode === 'paint') {
    const pos = screenToTile(e.clientX, e.clientY);
    if (pos) {
      isPainting = true;
      paintAt(pos.q, pos.r);
    }
    e.preventDefault();
    return;
  }

  leftPointerDown = true;
  leftPointerDragged = false;
  isPanning = false;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panCamStartX = camX;
  panCamStartY = camY;
  e.preventDefault();
});

function applyToolAtClientPoint(clientX, clientY) {
  const pos = screenToTile(clientX, clientY);
  if (!pos) return;

  applyToolAt(pos.q, pos.r);
}

function applyToolAt(q, r) {
  if (currentTool === 'paint') {
    paintAt(q, r);
  } else if (currentTool === 'move') {
    if (selectedEntity) {
      // Move selected entity to clicked tile
      moveEntityTo(q, r);
    } else {
      // Try to select entity at clicked tile
      const cityIdx = scenario.cities.findIndex(c => c.q === q && c.r === r);
      if (cityIdx >= 0) { selectEntity('city', cityIdx); return; }
      const unitIdx = scenario.units.findIndex(u => u.q === q && u.r === r);
      if (unitIdx >= 0) { selectEntity('unit', unitIdx); return; }
    }
  } else if (currentTool === 'setStart') {
    setStartPosition(q, r);
  } else if (currentTool === 'addCity') {
    addCityAt(q, r);
  } else if (currentTool === 'addUnit') {
    addUnitAt(q, r);
  }
}

function panToPointer(clientX, clientY) {
  const dx = (clientX - panStartX) / zoom;
  const dy = (clientY - panStartY) / zoom;
  camX = panCamStartX - dx;
  camY = panCamStartY - dy;
  clampCamera();
  render();
}

viewport.addEventListener('mousemove', (e) => {
  const pos = screenToTile(e.clientX, e.clientY);
  if (pos) {
    document.getElementById('status-pos').textContent = `q/r (${pos.q}, ${pos.r})`;
    const resourceId = tileResources[pos.r][pos.q];
    const resource = resourceId ? getNaturalResource(resourceId) : null;
    document.getElementById('status-tile').textContent = resource
      ? `${tiles[pos.r][pos.q]} • ${resource.name}`
      : tiles[pos.r][pos.q];
  }

  if (isPainting && currentTool === 'paint' && pos) {
    paintAt(pos.q, pos.r);
    return;
  }

  if (leftPointerDown) {
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    if (!leftPointerDragged && Math.sqrt(dx * dx + dy * dy) >= DRAG_THRESHOLD) {
      leftPointerDragged = true;
      if (currentTool === 'paint' && interactionMode === 'pan') {
        isPanning = true;
        updateViewportCursor();
      }
    }
  }

  if (isPanning) {
    panToPointer(e.clientX, e.clientY);
  }
});

window.addEventListener('mouseup', (e) => {
  if (e.button === 0 && isPainting) {
    isPainting = false;
    return;
  }

  if (e.button === 0 && leftPointerDown) {
    if (!leftPointerDragged && !(currentTool === 'paint' && interactionMode === 'pan')) {
      applyToolAtClientPoint(e.clientX, e.clientY);
    }
    leftPointerDown = false;
    leftPointerDragged = false;
    isPanning = false;
    updateViewportCursor();
  }

  if (e.button === 1 || e.button === 2) {
    isPanning = false;
    updateViewportCursor();
  }
});

viewport.addEventListener('contextmenu', (e) => e.preventDefault());

// Zoom with scroll wheel
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // World point under cursor before zoom
  const wxBefore = mx / zoom + camX;
  const wyBefore = my / zoom + camY;

  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom * factor));

  // Adjust cam so same world point stays under cursor
  camX = wxBefore - mx / zoom;
  camY = wyBefore - my / zoom;
  clampCamera();

  render();
}, { passive: false });

// ─── Rendering ──────────────────────────────────────────────────────────────

function resizeCanvas() {
  canvas.width = viewport.clientWidth;
  canvas.height = viewport.clientHeight;
  clampCamera();
}

window.addEventListener('resize', () => { resizeCanvas(); render(); });

function render() {
  if (!tiles) return;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const viewLeft = camX;
  const viewTop = camY;
  const viewRight = camX + w / zoom;
  const viewBottom = camY + h / zoom;

  // Draw tiles
  for (let r = 0; r < mapH; r++) {
    for (let q = 0; q < mapW; q++) {
      const rect = hexRect(q, r);
      if (rect.x > viewRight || rect.x + rect.width < viewLeft || rect.y > viewBottom || rect.y + rect.height < viewTop) {
        continue;
      }

      drawHex(q, r, TILE_COLORS[tiles[r][q]] || '#ff00ff');
    }
  }

  // Grid lines (only if zoomed in enough)
  if (zoom > 0.3) {
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1;
    for (let r = 0; r < mapH; r++) {
      for (let q = 0; q < mapW; q++) {
        const rect = hexRect(q, r);
        if (rect.x > viewRight || rect.x + rect.width < viewLeft || rect.y > viewBottom || rect.y + rect.height < viewTop) {
          continue;
        }

        strokeHex(q, r, 'rgba(0,0,0,0.2)', 1);
      }
    }
  }

  // Draw resource icons on top of terrain
  for (let r = 0; r < mapH; r++) {
    for (let q = 0; q < mapW; q++) {
      const resourceId = tileResources[r][q];
      if (!resourceId) continue;
      const rect = hexRect(q, r);
      if (rect.x > viewRight || rect.x + rect.width < viewLeft || rect.y > viewBottom || rect.y + rect.height < viewTop) {
        continue;
      }
      drawResource(q, r, resourceId);
    }
  }

  // Draw cities
  for (let i = 0; i < scenario.cities.length; i++) {
    const city = scenario.cities[i];
    const nation = scenario.nations.find(n => n.id === city.nationId);
    const world = tileToWorld(city.q, city.r);
    const sx = (world.x - camX) * zoom;
    const sy = (world.y - camY) * zoom;
    const r = Math.max(4, tileSize * zoom * 0.35);

    const isSelected = selectedEntity?.kind === 'city' && selectedEntity.index === i;

    // City circle
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = nation?.color || getRegistryNation(city.nationId)?.color || '#888';
    ctx.fill();
    ctx.strokeStyle = isSelected ? '#fff' : '#000';
    ctx.lineWidth = isSelected ? 3 : 1.5;
    ctx.stroke();

    // Capital star marker
    if (city.isCapital) {
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.max(10, r)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u2605', sx, sy + 1);
    }

    // Label
    if (zoom > 0.2) {
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.font = `bold ${Math.max(9, 11 * zoom)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.strokeText(city.name, sx, sy + r + 2);
      ctx.fillText(city.name, sx, sy + r + 2);
    }
  }

  // Draw selected nation start territory center
  const selectedNation = getSelectedNation();
  if (selectedNation?.startTerritoryCenter) {
    const center = selectedNation.startTerritoryCenter;
    const world = tileToWorld(center.q, center.r);
    const sx = (world.x - camX) * zoom;
    const sy = (world.y - camY) * zoom;
    const r = Math.max(6, tileSize * zoom * 0.28);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx - r, sy);
    ctx.lineTo(sx + r, sy);
    ctx.moveTo(sx, sy - r);
    ctx.lineTo(sx, sy + r);
    ctx.stroke();
    ctx.strokeStyle = selectedNation.color || '#fff';
    ctx.lineWidth = 4;
    strokeHex(center.q, center.r, selectedNation.color || '#fff', 4);
  }

  // Draw units
  for (let i = 0; i < scenario.units.length; i++) {
    const unit = scenario.units[i];
    const nation = scenario.nations.find(n => n.id === unit.nationId);
    const world = tileToWorld(unit.q, unit.r);
    const sx = (world.x - camX) * zoom;
    const sy = (world.y - camY) * zoom;
    const s = Math.max(4, tileSize * zoom * 0.25);

    const isSelected = selectedEntity?.kind === 'unit' && selectedEntity.index === i;

    // Unit diamond
    ctx.beginPath();
    ctx.moveTo(sx, sy - s);
    ctx.lineTo(sx + s, sy);
    ctx.lineTo(sx, sy + s);
    ctx.lineTo(sx - s, sy);
    ctx.closePath();
    ctx.fillStyle = nation?.color || getRegistryNation(unit.nationId)?.color || '#888';
    ctx.fill();
    ctx.strokeStyle = isSelected ? '#fff' : '#000';
    ctx.lineWidth = isSelected ? 3 : 1.5;
    ctx.stroke();

    // Label
    if (zoom > 0.3) {
      ctx.fillStyle = '#ccc';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.font = `${Math.max(8, 9 * zoom)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.strokeText(unit.unitTypeId, sx, sy + s + 2);
      ctx.fillText(unit.unitTypeId, sx, sy + s + 2);
    }
  }
}

function drawHex(q, r, fillStyle) {
  const points = hexCorners(q, r).map(worldToScreen);
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
  ctx.closePath();
  ctx.fillStyle = fillStyle;
  ctx.fill();
}

function strokeHex(q, r, strokeStyle, lineWidth) {
  const points = hexCorners(q, r).map(worldToScreen);
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
  ctx.closePath();
  ctx.strokeStyle = strokeStyle;
  ctx.lineWidth = lineWidth;
  ctx.stroke();
}

function drawResource(q, r, resourceId) {
  const resource = getNaturalResource(resourceId);
  const world = tileToWorld(q, r);
  const sx = (world.x - camX) * zoom;
  const sy = (world.y - camY) * zoom;
  const size = Math.max(8, tileSize * zoom * 0.58);

  if (!resource) {
    drawResourceFallback(resourceId, sx, sy, size);
    return;
  }

  const image = getResourceImage(resource);
  if (image?.complete && image.naturalWidth > 0) {
    ctx.save();
    ctx.globalAlpha = 0.95;
    ctx.drawImage(image, sx - size / 2, sy - size / 2, size, size);
    ctx.restore();
    return;
  }

  drawResourceFallback(resource.name, sx, sy, size);
}

function getResourceImage(resource) {
  if (resourceImages.has(resource.id)) return resourceImages.get(resource.id);
  const image = new Image();
  image.src = resource.iconPath || `/assets/sprites/resources/${resource.id}.png`;
  image.addEventListener('load', render, { once: true });
  image.addEventListener('error', render, { once: true });
  resourceImages.set(resource.id, image);
  return image;
}

function drawResourceFallback(label, sx, sy, size) {
  const text = label
    .split(/\s+/)
    .map(part => part.charAt(0))
    .join('')
    .slice(0, 2)
    .toUpperCase();
  ctx.fillStyle = '#fff7cc';
  ctx.strokeStyle = '#2b2112';
  ctx.lineWidth = 3;
  ctx.font = `bold ${Math.max(9, size * 0.35)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeText(text, sx, sy);
  ctx.fillText(text, sx, sy);
}

function worldToScreen(point) {
  return {
    x: (point.x - camX) * zoom,
    y: (point.y - camY) * zoom,
  };
}

// ─── Save / Download ────────────────────────────────────────────────────────

function validateScenario() {
  const warnings = [];
  const registryIds = new Set(nationRegistry.nations.map(nation => nation.nationId));
  const activeIds = new Set(scenario.nations.map(nation => nation.id));

  for (const nation of scenario.nations) {
    if (!registryIds.has(nation.id)) warnings.push(`${nation.name} has unknown nation ID ${nation.id}`);
    const cities = scenario.cities.filter(c => c.nationId === nation.id);
    const capitals = cities.filter(c => c.isCapital);
    const settlers = scenario.units.filter(u => u.nationId === nation.id && u.unitTypeId === 'settler');
    if (cities.length === 0 && settlers.length === 0) warnings.push(`${nation.name} has no city or settler`);
    if (cities.length > 0 && capitals.length === 0) warnings.push(`${nation.name} has no capital`);
    if (capitals.length > 1) warnings.push(`${nation.name} has ${capitals.length} capitals`);
  }

  for (const city of scenario.cities) {
    if (!activeIds.has(city.nationId)) warnings.push(`${city.name} references inactive or unknown nation ${city.nationId}`);
  }

  for (const unit of scenario.units) {
    if (!activeIds.has(unit.nationId)) warnings.push(`${unit.unitTypeId} at (${unit.q},${unit.r}) references inactive or unknown nation ${unit.nationId}`);
  }

  for (let r = 0; r < mapH; r++) {
    for (let q = 0; q < mapW; q++) {
      const resourceId = tileResources[r][q];
      if (!resourceId) continue;
      if (!getNaturalResource(resourceId)) {
        warnings.push(`Unknown resource ${resourceId} at (${q},${r})`);
      } else if (!isResourceAllowedOnTile(resourceId, tiles[r][q])) {
        warnings.push(`${resourceId} is not allowed on ${tiles[r][q]} at (${q},${r})`);
      }
    }
  }

  return warnings;
}

function showValidationWarnings(warnings) {
  const box = document.getElementById('validation-warning');
  if (warnings.length === 0) {
    box.style.display = 'none';
    box.textContent = '';
    return;
  }

  box.style.display = '';
  box.textContent = `Soft validation warnings:\n- ${warnings.join('\n- ')}\n\nExport is still allowed.`;
}

document.getElementById('save-btn').addEventListener('click', () => {
  showValidationWarnings(validateScenario());

  // Rebuild flat q/r tiles array from 2D
  const flatTiles = [];
  for (let r = 0; r < mapH; r++) {
    for (let q = 0; q < mapW; q++) {
      const tile = { q, r, type: tiles[r][q] };
      if (tileResources[r][q] !== undefined) tile.resourceId = tileResources[r][q];
      flatTiles.push(tile);
    }
  }

  const output = {
    meta: scenario.meta,
    map: { width: mapW, height: mapH, tileSize, tiles: flatTiles },
    nations: scenario.nations,
    cities: scenario.cities,
    units: scenario.units,
  };

  const blob = new Blob([JSON.stringify(output)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentMap ? getMapFilename(currentMap) : 'scenario.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('exit-btn').addEventListener('click', () => {
  window.location.href = '/';
});

// ─── Keyboard shortcuts ─────────────────────────────────────────────────────

const heldKeys = new Set();

function isTypingTarget(target) {
  return target instanceof HTMLInputElement || target instanceof HTMLSelectElement || target instanceof HTMLTextAreaElement;
}

window.addEventListener('keydown', (e) => {
  if (isTypingTarget(e.target)) return;

  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D'].includes(e.key)) {
    heldKeys.add(e.key.toLowerCase());
    e.preventDefault();
  }

  // Number keys 1-8 select terrain type
  const num = parseInt(e.key);
  if (num >= 1 && num <= TILE_TYPES.length) {
    currentTerrain = TILE_TYPES[num - 1];
    currentTool = 'paint';
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === 'paint'));
    updateToolPanels();
    setInteractionMode('paint');
    document.querySelectorAll('.palette-btn').forEach(b => b.classList.toggle('active', b.dataset.type === currentTerrain));
    render();
  }

  // Escape deselects entity
  if (e.key === 'Escape') {
    selectedEntity = null;
    updateEntityHighlights();
    render();
  }

  // +/- for brush size
  if (e.key === '+' || e.key === '=') {
    brushSize = Math.min(5, brushSize + 1);
    brushInput.value = brushSize;
    brushLabel.textContent = brushSize;
  }
  if (e.key === '-') {
    brushSize = Math.max(1, brushSize - 1);
    brushInput.value = brushSize;
    brushLabel.textContent = brushSize;
  }
});

window.addEventListener('keyup', (e) => {
  heldKeys.delete(e.key.toLowerCase());
});

let lastFrameTime = performance.now();
function updateCameraFrame(now) {
  const delta = now - lastFrameTime;
  lastFrameTime = now;

  const speed = (PAN_SPEED / zoom) * (delta / 1000);
  const moveLeft = heldKeys.has('arrowleft') || heldKeys.has('a');
  const moveRight = heldKeys.has('arrowright') || heldKeys.has('d');
  const moveUp = heldKeys.has('arrowup') || heldKeys.has('w');
  const moveDown = heldKeys.has('arrowdown') || heldKeys.has('s');

  if (moveLeft || moveRight || moveUp || moveDown) {
    if (moveLeft) camX -= speed;
    if (moveRight) camX += speed;
    if (moveUp) camY -= speed;
    if (moveDown) camY += speed;
    clampCamera();
    render();
  }

  requestAnimationFrame(updateCameraFrame);
}

function setStatusInfo(message) {
  document.getElementById('status-info').textContent = message;
}

// ─── Start ──────────────────────────────────────────────────────────────────

init();
requestAnimationFrame(updateCameraFrame);
</script>
